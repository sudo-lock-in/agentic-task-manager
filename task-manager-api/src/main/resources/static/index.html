<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-secondary {
            background: #6c757d;
            margin-top: 10px;
        }

        .button-secondary:hover {
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }

        .task-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .task-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: box-shadow 0.3s;
        }

        .task-item:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .task-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .task-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-weight: 500;
        }

        .priority-high {
            background: #ffe6e6;
            color: #d32f2f;
        }

        .priority-medium {
            background: #fff3e0;
            color: #f57c00;
        }

        .priority-low {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status-todo {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-in_progress {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .status-done {
            background: #e8f5e9;
            color: #388e3c;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .task-actions button {
            flex: 1;
            padding: 6px;
            font-size: 12px;
            background: #dc3545;
        }

        .task-actions button:hover {
            box-shadow: 0 2px 8px rgba(220, 53, 69, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .section-notice {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.4;
        }

        .section-notice:empty {
            display: none;
        }

        .section-notice-info {
            background: #e8f0fe;
            color: #1a3c5e;
            border: 1px solid #c6dafc;
        }

        .section-notice-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .section-notice-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Task Manager</h1>
            <p>Manage your tasks efficiently with AI-powered suggestions</p>
        </header>

        <div class="content">
            <!-- Left Column: Create Task -->
            <div>
                <h2 class="section-title">➕ Create Task</h2>
                <!-- Form for manual task creation -->
                <div id="alertContainer"></div>

                <!-- Form for manual task creation -->
                <div>
                    <h3 style="font-size: 14px; color: #666; margin-bottom: 15px; font-weight: 600;">Manual Entry</h3>
                    <div class="form-group">
                        <label for="title">Task Title *</label>
                        <input type="text" id="title" placeholder="Enter task title" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" placeholder="Enter task description"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate">
                    </div>

                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority">
                            <option value="">-- Select Priority --</option>
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="">-- Select Status --</option>
                            <option value="TODO">To Do</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="DONE">Done</option>
                        </select>
                    </div>

                    <button onclick="createTask()">Create Task</button>
                    <div id="manualNotice" class="section-notice" aria-live="polite"></div>
                </div>

                <!-- Divider -->
                <div style="margin: 30px 0; text-align: center; color: #ddd;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="flex: 1; height: 1px; background: #ddd;"></div>
                        <span style="color: #999; font-size: 12px;">OR</span>
                        <div style="flex: 1; height: 1px; background: #ddd;"></div>
                    </div>
                </div>

                <!-- AI Suggestion -->
                <div>
                    <h3 style="font-size: 14px; color: #666; margin-bottom: 15px; font-weight: 600;">🤖 AI Suggestion</h3>
                    <div class="form-group">
                        <label for="aiDescription">Describe what you need to do</label>
                        <textarea id="aiDescription" placeholder="e.g., 'remind me to submit the quarterly report before Friday'"></textarea>
                    </div>
                    <button onclick="suggestTask()" class="button-secondary" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">Get AI Suggestion</button>
                    <div id="aiNotice" class="section-notice section-notice-info" aria-live="polite">
                        Local Ollama Mistral runs at http://localhost:11434. If it is not running, AI suggestions fall back to a basic task.
                    </div>
                </div>
            </div>

            <!-- Right Column: Task List -->
            <div>
                <h2 class="section-title">📋 Your Tasks</h2>
                <div class="task-list" id="taskList">
                    <div class="empty-state">
                        <p>No tasks yet. Create one to get started!</p>
                    </div>
                </div>
                <button onclick="refreshTasks()" style="margin-top: 15px;">🔄 Refresh Tasks</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin === 'null' ? 'http://localhost:8080' : window.location.origin;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            refreshTasks();
        });

        function setSectionNotice(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            if (!element) return;

            if (!message) {
                element.textContent = '';
                element.className = 'section-notice';
                return;
            }

            element.className = `section-notice section-notice-${type}`;
            element.textContent = message;
        }

        // Create task from manual form
        async function createTask() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const dueDate = document.getElementById('dueDate').value;
            const priority = document.getElementById('priority').value;
            const status = document.getElementById('status').value;

            if (!title) {
                setSectionNotice('manualNotice', 'Please enter a task title before creating it.', 'error');
                return;
            }

            const task = {
                title,
                description: description || null,
                dueDate: dueDate || null,
                priority: priority || 'MEDIUM',
                status: status || 'TODO'
            };

            try {
                setSectionNotice('manualNotice', 'Creating task...', 'info');
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(task)
                });

                if (!response.ok) throw new Error('Failed to create task');

                setSectionNotice('manualNotice', 'Task created successfully!', 'success');
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('dueDate').value = '';
                document.getElementById('priority').value = '';
                document.getElementById('status').value = '';
                
                refreshTasks();
            } catch (error) {
                setSectionNotice('manualNotice', 'Error creating task: ' + error.message, 'error');
            }
        }

        // Get AI suggestion
        async function suggestTask() {
            const description = document.getElementById('aiDescription').value.trim();

            if (!description) {
                setSectionNotice('aiNotice', 'Please describe what you need to do before requesting a suggestion.', 'error');
                return;
            }

            try {
                setSectionNotice('aiNotice', 'Getting AI suggestion from local Ollama...', 'info');
                const response = await fetch(`${API_BASE}/tasks/suggest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description })
                });

                if (!response.ok) throw new Error('Failed to get suggestion');

                const suggestedTask = await response.json();
                
                // Populate form with suggested values
                document.getElementById('title').value = suggestedTask.title || '';
                document.getElementById('description').value = suggestedTask.description || '';
                document.getElementById('dueDate').value = suggestedTask.dueDate || '';
                document.getElementById('priority').value = suggestedTask.priority || 'MEDIUM';
                document.getElementById('status').value = suggestedTask.status || 'TODO';
                
                document.getElementById('aiDescription').value = '';
                setSectionNotice('aiNotice', 'AI suggestion loaded. Review it and create the task when ready.', 'success');
            } catch (error) {
                setSectionNotice('aiNotice', 'Error getting suggestion: ' + error.message, 'error');
            }
        }

        // Refresh task list
        async function refreshTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                if (!response.ok) throw new Error('Failed to fetch tasks');

                const tasks = await response.json();
                renderTasks(tasks);
            } catch (error) {
                showAlert('Error loading tasks: ' + error.message, 'error');
            }
        }

        // Render tasks
        function renderTasks(tasks) {
            const taskList = document.getElementById('taskList');

            if (!tasks || tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-state"><p>No tasks yet. Create one to get started!</p></div>';
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <div class="task-item">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                    <div class="task-meta">
                        <span class="badge priority-${task.priority.toLowerCase()}">${task.priority}</span>
                        <span class="badge status-${task.status.toLowerCase()}">${formatStatus(task.status)}</span>
                        ${task.dueDate ? `<span style="color: #999;">📅 ${task.dueDate}</span>` : ''}
                    </div>
                    <div class="task-actions">
                        <button onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Delete task
        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;

            try {
                const response = await fetch(`${API_BASE}/tasks/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Failed to delete task');

                showAlert('Task deleted successfully!', 'success');
                refreshTasks();
            } catch (error) {
                showAlert('Error deleting task: ' + error.message, 'error');
            }
        }

        // Show alert message
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);

            if (type !== 'error') {
                setTimeout(() => alert.remove(), 3000);
            }
        }

        // Utility functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatStatus(status) {
            return status.replace(/_/g, ' ');
        }
    </script>
</body>
</html>
